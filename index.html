<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1A1A2E">
<title>לוז ניקיון מקררים | שופרסל</title>
<link rel="manifest" href="manifest.json">
<style>
:root{
  --yellow:#FFCC00; --dark:#1A1A2E; --red:#CC0000; --red-bg:#FFF0F0;
  --green:#27AE60;  --green-bg:#E8F8F1; --orange:#E67E22;
  --gray:#95A5A6;   --light:#F2F2F5;   --white:#fff; --border:#E0E0E0;
  --shadow:0 2px 10px rgba(0,0,0,.10);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--light);color:var(--dark);
     direction:rtl;min-height:100vh;display:flex;flex-direction:column;font-size:18px}

/* ═══ HEADER ═══ */
header{background:var(--dark);color:var(--yellow);padding:14px 18px;
       display:flex;align-items:center;justify-content:space-between;
       position:sticky;top:0;z-index:300;box-shadow:0 4px 14px rgba(0,0,0,.45)}
.hd-left{display:flex;align-items:center;gap:13px}
.logo{background:var(--yellow);color:var(--dark);font-weight:900;font-size:26px;
      width:52px;height:52px;border-radius:10px;display:flex;align-items:center;
      justify-content:center;flex-shrink:0}
.hd-title{font-size:26px;font-weight:800;line-height:1.15}
.hd-sub{font-size:15px;color:#bbb;margin-top:1px}
.week-chip{background:var(--yellow);color:var(--dark);border-radius:22px;
           padding:6px 16px;font-size:15px;font-weight:800;white-space:nowrap}

/* ═══ BACK BUTTON (day pages) ═══ */
.back-btn{display:none;align-items:center;gap:8px;background:rgba(255,204,0,.15);
          border:none;color:var(--yellow);font-size:18px;font-weight:700;
          cursor:pointer;padding:6px 14px;border-radius:22px;font-family:inherit}
.back-btn.vis{display:flex}
.back-btn:active{opacity:.75}

/* ═══ ALERT BANNER ═══ */
.alert-bar{display:none;background:var(--red);color:#fff;padding:13px 18px;
           font-size:17px;font-weight:700;cursor:pointer;text-align:center}
.alert-bar.on{display:block;animation:blink 1.6s ease infinite}
@keyframes blink{0%,100%{background:var(--red)}50%{background:#E53935}}

/* ═══ PROGRESS ═══ */
.prog{background:var(--white);padding:13px 18px;border-bottom:1px solid var(--border)}
.prog-row{display:flex;justify-content:space-between;font-size:16px;color:#555;margin-bottom:7px}
.prog-bar{height:9px;background:#e0e0e0;border-radius:5px;overflow:hidden}
.prog-fill{height:100%;background:var(--green);border-radius:5px;transition:width .4s}

/* ═══ VIEWS ═══ */
main{flex:1;padding:16px 16px 90px;max-width:620px;margin:0 auto;width:100%}
.view{display:none}.view.on{display:block}

/* ═══ HOME — WEEK OVERVIEW ═══ */
.home-title{font-size:22px;font-weight:800;color:var(--dark);
            margin-bottom:16px;padding-bottom:10px;border-bottom:3px solid var(--yellow)}

/* Day block */
.day-block{background:var(--white);border-radius:14px;margin-bottom:14px;
           box-shadow:var(--shadow);overflow:hidden}
.day-block-hdr{display:flex;align-items:center;justify-content:space-between;
               padding:13px 16px;cursor:pointer;background:var(--dark);
               transition:background .2s}
.day-block-hdr:active{background:#2c2c4a}
.day-block-hdr.today-hdr{background:#1a3a1a}
.day-block-hdr.all-done{background:#1a3a1a}
.day-block-hdr.has-late{background:#3a1a1a}
.dh-name{font-size:20px;font-weight:800;color:var(--yellow)}
.dh-name.today-tag::after{content:' — היום';font-size:14px;color:#aaa;font-weight:400}
.dh-right{display:flex;align-items:center;gap:10px}
.dh-count{font-size:15px;color:#ccc}
.dh-arrow{font-size:18px;color:var(--yellow)}
.dh-date{font-size:14px;color:#999}

/* Compact task row on home page */
.task-row{display:flex;align-items:center;gap:14px;padding:12px 16px;
          border-bottom:1px solid var(--border);cursor:pointer;
          transition:background .15s;user-select:none}
.task-row:last-child{border-bottom:none}
.task-row:active{background:#f0f0f0}
.task-row.row-done{background:var(--green-bg)}
.task-row.row-late{background:var(--red-bg);animation:row-pulse 2s ease infinite}
@keyframes row-pulse{0%,100%{background:var(--red-bg)}50%{background:#FFE0E0}}
.tr-ico{width:34px;height:34px;border-radius:50%;border:2.5px solid #ccc;
        display:flex;align-items:center;justify-content:center;
        font-size:19px;flex-shrink:0;background:#fafafa;transition:all .2s}
.task-row.row-done .tr-ico{background:var(--green);border-color:var(--green);color:#fff}
.task-row.row-late .tr-ico{border-color:var(--red);background:var(--red-bg)}
.tr-info{flex:1;min-width:0}
.tr-name{font-size:18px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-row.row-done .tr-name{text-decoration:line-through;color:#aaa}
.tr-loc{font-size:14px;color:#aaa;margin-top:2px}
.tr-loc::before{content:'📍 '}
.tr-status{font-size:13px;font-weight:700;margin-top:3px}
.tr-status.ok{color:var(--green)}.tr-status.bad{color:var(--red)}

/* ═══ DAY DETAIL VIEW ═══ */
.day-view-hdr{display:flex;align-items:center;justify-content:space-between;
              margin-bottom:18px;padding-bottom:12px;border-bottom:3px solid var(--yellow)}
.day-view-name{font-size:28px;font-weight:800}
.day-view-date{font-size:16px;color:#777;background:var(--light);
               padding:5px 14px;border-radius:14px}

/* Big task card (day detail) */
.card{background:var(--white);border-radius:14px;padding:18px 18px;margin-bottom:12px;
      display:flex;align-items:center;gap:16px;box-shadow:var(--shadow);
      border-right:6px solid var(--gray);cursor:pointer;transition:all .2s;user-select:none}
.card:active{transform:scale(.98)}
.card.done{background:var(--green-bg);border-right-color:var(--green)}
.card.late{background:var(--red-bg);border-right-color:var(--red);
           animation:card-pulse 1.8s ease infinite}
@keyframes card-pulse{0%,100%{border-right-color:var(--red)}50%{border-right-color:var(--orange)}}
.chk{width:38px;height:38px;border-radius:50%;border:3px solid #ccc;
     display:flex;align-items:center;justify-content:center;
     flex-shrink:0;font-size:22px;transition:all .2s;background:#fafafa}
.card.done .chk{background:var(--green);border-color:var(--green);color:#fff}
.card.late .chk{border-color:var(--red);background:var(--red-bg)}
.cinfo{flex:1;min-width:0}
.cname{font-size:21px;font-weight:800}
.card.done .cname{text-decoration:line-through;color:#aaa}
.cloc{font-size:16px;color:#999;margin-top:4px}
.cloc::before{content:'📍 '}
.cst{font-size:15px;font-weight:700;margin-top:5px}
.cst.ok{color:var(--green)}.cst.bad{color:var(--red)}

/* ═══ PERIODIC SECTION ═══ */
.peri-wrap{margin-top:22px}
.sec-lbl{font-size:18px;font-weight:800;background:var(--yellow);color:var(--dark);
         padding:9px 16px;border-radius:10px;margin-bottom:12px}
.peri-card{background:var(--white);border-radius:14px;padding:16px 18px;
           margin-bottom:12px;box-shadow:var(--shadow);border-right:6px solid var(--orange)}
.peri-name{font-size:18px;font-weight:800}
.peri-dates{font-size:14px;color:#888;margin-top:5px}
.peri-next{font-size:16px;color:var(--orange);font-weight:700;margin-top:6px}

/* ═══ EMPTY ═══ */
.empty{text-align:center;padding:50px 20px;color:#ccc;font-size:18px}
.empty-ico{font-size:52px;margin-bottom:12px}

/* ═══ MODAL ═══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;
         display:flex;align-items:center;justify-content:center;padding:18px}
.modal{background:var(--white);border-radius:20px;padding:28px 22px;
       max-width:380px;width:100%;box-shadow:0 14px 50px rgba(0,0,0,.28);
       max-height:88vh;overflow-y:auto}
.m-ico{font-size:54px;text-align:center;margin-bottom:12px}
.m-title{font-size:24px;font-weight:800;text-align:center;margin-bottom:18px}
.m-title.red{color:var(--red)}.m-title.orange{color:var(--orange)}
.m-list{list-style:none;margin-bottom:20px}
.m-list li{padding:11px 14px;border-radius:10px;margin-bottom:8px;
           font-size:16px;border-right:4px solid}
.m-list li.red{background:var(--red-bg);border-color:var(--red)}
.m-list li.orange{background:#FFF8E1;border-color:var(--orange)}
.m-btn{width:100%;padding:16px;background:var(--dark);color:var(--yellow);
       border:none;border-radius:12px;font-size:18px;font-weight:800;
       cursor:pointer;font-family:inherit}
.m-btn:active{opacity:.85}

/* ═══ FAB ═══ */
.fab{position:fixed;bottom:76px;left:18px;width:54px;height:54px;
     background:var(--dark);color:var(--yellow);border-radius:50%;border:none;
     font-size:22px;cursor:pointer;box-shadow:0 5px 16px rgba(0,0,0,.38);
     display:flex;align-items:center;justify-content:center;z-index:100}

/* ═══ COPYRIGHT FOOTER ═══ */
.copyright{text-align:center;padding:18px 16px 12px;font-size:15px;
           color:var(--gray);border-top:1px solid var(--border);background:var(--white)}
.copyright a{color:var(--gray);text-decoration:none}
.copyright a:hover{text-decoration:underline}
</style>
</head>
<body>

<!-- MODAL -->
<div class="overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="m-ico" id="mIco">⚠️</div>
    <div class="m-title red" id="mTitle">משימות לא בוצעו!</div>
    <ul class="m-list" id="mList"></ul>
    <button class="m-btn" onclick="closeModal()">הבנתי — סגור</button>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="hd-left">
    <div class="logo">ש</div>
    <div>
      <div class="hd-title">לוז ניקיון מקררים</div>
      <div class="hd-sub">שופרסל — תברואה שבועית</div>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
    <div class="week-chip" id="weekChip">…</div>
    <button class="back-btn" id="backBtn" onclick="goHome()">← חזרה</button>
  </div>
</header>

<!-- ALERT BANNER -->
<div class="alert-bar" id="alertBar" onclick="showOverdueModal()">
  ⚠️ יש משימות שלא בוצעו — לחץ לפרטים
</div>

<!-- PROGRESS (always visible) -->
<div class="prog">
  <div class="prog-row">
    <span>התקדמות השבוע</span>
    <span id="progTxt">0 / 13</span>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
</div>

<!-- MAIN -->
<main id="mainWrap">

  <!-- ── HOME VIEW ── -->
  <div class="view on" id="viewHome">
    <div class="home-title">סקירה שבועית — כל המשימות</div>
    <div id="homeBlocks"></div>
  </div>

  <!-- ── DAY DETAIL VIEWS (d0–d5) ── -->
  <div class="view" id="viewDay">
    <div class="day-view-hdr">
      <div class="day-view-name" id="dvName">יום …</div>
      <div class="day-view-date" id="dvDate">…</div>
    </div>
    <div id="dvCards"></div>
  </div>

</main>

<!-- FAB — today -->
<button class="fab" onclick="goToday()" title="היום">📅</button>

<!-- FOOTER -->
<div class="copyright">© <a href="mailto:evgenchuk1@gmail.com">יבגני ציפיס</a> 2026</div>

<script>
// ══════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════
const DAYS = ['ראשון','שני','שלישי','רביעי','חמישי','שישי'];

const TASKS = [
  {id:'t01',name:'מקרר ביצים',               location:'מחסן -1',     day:0},
  {id:'t02',name:'מקרר חלב + מדפים',         location:'מחסן -1',     day:0},
  {id:'t03',name:'מקרר ירקות',               location:'מחסן -1',     day:1},
  {id:'t04',name:'מקפיא קפואים',             location:'מחסן -1',     day:1},
  {id:'t05',name:'מקפיא מאפית',              location:'מאפית',       day:2},
  {id:'t06',name:'מקרר מאפית',               location:'מאפית',       day:2},
  {id:'t07',name:'מקרר בשר',                 location:'קצביה',       day:3},
  {id:'t08',name:'מקרר עופות',               location:'קצביה',       day:3},
  {id:'t09',name:'גיבוי גבינות',             location:'מעדניה גבוי', day:4},
  {id:'t10',name:'מקפיא מאפית 2',            location:'מחסן -1',     day:4},
  {id:'t11',name:'מקרר החזרות',              location:'מחסן -1',     day:4},
  {id:'t12',name:'ניקיון וסדר רמפה',         location:'רמפה',        day:5},
  {id:'t13',name:'מקרר דגים ועופות חיצוני', location:'אולם',        day:5},
];

const PERIODIC = [
  {name:'ניקיון מדף תחתון — מקרר ירקות',
   dates:['שישי 19.6.2026','שישי 19.7.2026','שישי 19.8.2026'],
   interval:'אחת לחודש', days:[5]},
  {name:'ניקיון מדף תחתון — מקרר חלב',
   dates:['שלישי-חמישי 23-25.6.2026','שלישי-חמישי 23-25.8.2026','שלישי-חמישי 23-25.10.2026'],
   interval:'אחת לחודשיים', days:[2,3,4]},
];

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
const KEY = 'shufersal_clean_v3';

function wkKey(d=new Date()){
  const s=new Date(d); s.setDate(s.getDate()-s.getDay());
  return s.toISOString().slice(0,10);
}
function sundayOf(off=0){
  const d=new Date(); d.setDate(d.getDate()-d.getDay()+off); return d;
}
function loadST(){try{return JSON.parse(localStorage.getItem(KEY))||{};}catch{return {};}}

let ST=loadST();
const CWK=wkKey();
let prevOD=[];

if(ST.wk && ST.wk!==CWK){
  prevOD=TASKS.filter(t=>!ST.done?.[t.id]);
  ST={wk:CWK,done:{}}; localStorage.setItem(KEY,JSON.stringify(ST));
}else if(!ST.wk){
  ST={wk:CWK,done:{}}; localStorage.setItem(KEY,JSON.stringify(ST));
}
function save(){localStorage.setItem(KEY,JSON.stringify(ST));}

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function todayIdx(){const d=new Date().getDay();return d<=5?d:-1;}
function dayDate(i){return sundayOf(i).toLocaleDateString('he-IL',{day:'numeric',month:'numeric'});}
function isDone(id){return !!ST.done?.[id];}
function isLate(t){return !isDone(t.id)&&t.day<todayIdx();}
function overdueNow(){return TASKS.filter(t=>isLate(t));}

// ══════════════════════════════════════════════
// RENDER — HEADER
// ══════════════════════════════════════════════
function renderHeader(){
  const s=sundayOf(0),f=sundayOf(5),o={day:'numeric',month:'numeric'};
  document.getElementById('weekChip').textContent=
    `${s.toLocaleDateString('he-IL',o)} – ${f.toLocaleDateString('he-IL',o)}`;
}

// ══════════════════════════════════════════════
// RENDER — PROGRESS
// ══════════════════════════════════════════════
function renderProgress(){
  const done=TASKS.filter(t=>isDone(t.id)).length,tot=TASKS.length;
  document.getElementById('progTxt').textContent=`${done} / ${tot}`;
  document.getElementById('progFill').style.width=Math.round(done/tot*100)+'%';
}

// ══════════════════════════════════════════════
// RENDER — ALERT BANNER
// ══════════════════════════════════════════════
function renderAlertBar(){
  overdueNow().length>0
    ?document.getElementById('alertBar').classList.add('on')
    :document.getElementById('alertBar').classList.remove('on');
}

// ══════════════════════════════════════════════
// RENDER — HOME (week overview)
// ══════════════════════════════════════════════
function renderHome(){
  const ti=todayIdx();
  let html='';
  DAYS.forEach((dn,i)=>{
    const ts=TASKS.filter(t=>t.day===i);
    const doneCnt=ts.filter(t=>isDone(t.id)).length;
    const lateCnt=ts.filter(t=>isLate(t)).length;
    const allDone=doneCnt===ts.length&&ts.length>0;
    const hdrCls=lateCnt>0?'has-late':allDone?'all-done':i===ti?'today-hdr':'';
    const nameCls=i===ti?'dh-name today-tag':'dh-name';

    html+=`<div class="day-block">
      <div class="day-block-hdr ${hdrCls}" onclick="openDayView(${i})">
        <div>
          <div class="${nameCls}">יום ${dn}</div>
          <div class="dh-date">${dayDate(i)}</div>
        </div>
        <div class="dh-right">
          <div class="dh-count">${doneCnt}/${ts.length}</div>
          <div class="dh-arrow">›</div>
        </div>
      </div>`;

    if(ts.length===0){
      html+=`<div style="padding:14px 18px;font-size:16px;color:#aaa">אין משימות ביום זה</div>`;
    }else{
      ts.forEach(t=>{
        const done=isDone(t.id),late=isLate(t);
        const rowCls=done?'row-done':late?'row-late':'';
        const ico=done?'✓':'';
        const st=done
          ?`<div class="tr-status ok">✅ בוצע ב-${ST.done[t.id]||''}</div>`
          :late?`<div class="tr-status bad">⚠️ לא בוצע — באיחור!</div>`:'';
        html+=`<div class="task-row ${rowCls}" onclick="toggle('${t.id}','home')">
          <div class="tr-ico">${ico}</div>
          <div class="tr-info">
            <div class="tr-name">${t.name}</div>
            <div class="tr-loc">${t.location}</div>${st}
          </div>
        </div>`;
      });
    }
    html+=`</div>`;
  });
  document.getElementById('homeBlocks').innerHTML=html;
}

// ══════════════════════════════════════════════
// RENDER — DAY DETAIL
// ══════════════════════════════════════════════
function renderDayView(i){
  const ts=TASKS.filter(t=>t.day===i);
  document.getElementById('dvName').textContent=`יום ${DAYS[i]}`;
  document.getElementById('dvDate').textContent=dayDate(i);

  let html='';
  if(!ts.length){
    html=`<div class="empty"><div class="empty-ico">✅</div>אין משימות ביום זה</div>`;
  }else{
    ts.forEach(t=>{
      const done=isDone(t.id),late=isLate(t);
      const cls=done?'done':late?'late':'';
      const st=done
        ?`<div class="cst ok">✅ בוצע ב-${ST.done[t.id]||''}</div>`
        :late?`<div class="cst bad">⚠️ לא בוצע — באיחור!</div>`:'';
      html+=`<div class="card ${cls}" onclick="toggle('${t.id}','day',${i})">
        <div class="chk">${done?'✓':''}</div>
        <div class="cinfo">
          <div class="cname">${t.name}</div>
          <div class="cloc">${t.location}</div>${st}
        </div>
      </div>`;
    });
  }

  // Periodic tasks
  const pp=PERIODIC.filter(p=>p.days.includes(i));
  if(pp.length){
    html+=`<div class="peri-wrap"><div class="sec-lbl">📋 משימות תקופתיות</div>`;
    pp.forEach(p=>{
      const next=p.dates.find(d=>{
        const m=d.match(/(\d+)\.(\d+)\.(\d+)/);
        return m&&new Date(+m[3],+m[2]-1,+m[1])>=new Date();
      })||p.dates.at(-1);
      html+=`<div class="peri-card">
        <div class="peri-name">${p.name}</div>
        <div class="peri-dates">📅 ${p.dates.join('&nbsp; | &nbsp;')}</div>
        <div class="peri-next">הבא: ${next} &nbsp;(${p.interval})</div>
      </div>`;
    });
    html+=`</div>`;
  }
  document.getElementById('dvCards').innerHTML=html;
}

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════
function openDayView(i){
  renderDayView(i);
  document.getElementById('viewHome').classList.remove('on');
  document.getElementById('viewDay').classList.add('on');
  document.getElementById('backBtn').classList.add('vis');
  window.scrollTo({top:0,behavior:'smooth'});
}

function goHome(){
  document.getElementById('viewDay').classList.remove('on');
  document.getElementById('viewHome').classList.add('on');
  document.getElementById('backBtn').classList.remove('vis');
  renderHome();
}

function goToday(){
  const i=todayIdx();
  if(i>=0) openDayView(i);
}

// ══════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════
function toggle(id,src,dayIdx){
  if(!ST.done)ST.done={};
  if(ST.done[id]){delete ST.done[id];}
  else{
    const now=new Date();
    ST.done[id]=now.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
  }
  save();
  renderProgress();
  renderAlertBar();
  if(src==='day'&&dayIdx!==undefined) renderDayView(dayIdx);
  else renderHome();
}

// ══════════════════════════════════════════════
// MODALS
// ══════════════════════════════════════════════
function showOverdueModal(){
  const list=overdueNow().map(t=>
    `<li class="red">⚠️ <strong>${t.name}</strong><br><small>יום ${DAYS[t.day]} | ${t.location}</small></li>`
  ).join('');
  openModal('⚠️','משימות לא בוצעו!','red',list);
}
function openModal(ico,title,cls,listHtml){
  document.getElementById('mIco').textContent=ico;
  document.getElementById('mTitle').textContent=title;
  document.getElementById('mTitle').className=`m-title ${cls}`;
  document.getElementById('mList').innerHTML=listHtml;
  document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none';}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
renderHeader();
renderProgress();
renderAlertBar();
renderHome();

// Previous week overdue alert
if(prevOD.length&&!sessionStorage.getItem('pw')){
  sessionStorage.setItem('pw','1');
  const list=prevOD.map(t=>`<li class="orange">${t.name} — ${t.location}</li>`).join('');
  setTimeout(()=>openModal('📋',`מהשבוע הקודם: ${prevOD.length} משימות לא בוצעו`,'orange',list),450);
}
// Current overdue alert
else if(overdueNow().length&&!sessionStorage.getItem('oa')){
  sessionStorage.setItem('oa','1');
  setTimeout(showOverdueModal,450);
}
</script>
